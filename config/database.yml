development:
  adapter: postgresql
  host: localhost
  port: 5544
  encoding: unicode
  database: ketten_development
  pool: 5
  username: postgres
  password: pgpassword

test:
  adapter: postgresql
  host: localhost
  port: 5544
  encoding: unicode
  database: ketten_test
  pool: 5
  username: postgres
  password: pgpassword

production:
  adapter: postgresql
  host: <%= ENV.fetch("DB_HOST", "ketten-db") %>
  encoding: unicode
  database: ketten_production
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
  username: <%= ENV.fetch("POSTGRES_USER", "ketten") %>
  password: <%= ENV["POSTGRES_PASSWORD"] %>
